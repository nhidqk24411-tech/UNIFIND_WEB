    <script>
      // Prevent libraries from crashing when trying to overwrite window.fetch
      (function() {
        var originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { console.warn('A library tried to overwrite window.fetch. Using original fetch instead.'); },
            configurable: true
          });
        } catch (e) {
          console.error('Failed to protect window.fetch:', e);
        }
      })();
    </script>
